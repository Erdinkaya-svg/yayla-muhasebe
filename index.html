<!DOCTYPE html>
<html lang="tr"><head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Yayla Konakları Muhasebe</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;overflow:hidden;}
body{background:#F8FAFC;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
input,select,button,textarea{font-family:inherit;font-size:16px;}
input,select,textarea{font-size:16px !important;touch-action:manipulation;}
::-webkit-scrollbar{width:0;height:0;}
div::-webkit-scrollbar{display:none;}
</style></head>
<body>
<div id="hata-kutusu" style="display:none;position:fixed;inset:0;background:#fff;z-index:99999;padding:20px;overflow:auto;font-family:monospace;font-size:13px;color:#b91c1c;white-space:pre-wrap;"></div>
<script>
window.addEventListener('error', function(e) {
  var kutu = document.getElementById('hata-kutusu');
  kutu.style.display = 'block';
  kutu.textContent += '\n\nHATA: ' + (e.message || '(mesaj yok)') +
    '\nDosya: ' + (e.filename || '(bilinmiyor)') +
    '\nSatır: ' + (e.lineno || '?') + ', Sütun: ' + (e.colno || '?') +
    (e.error && e.error.stack ? '\nStack:\n' + e.error.stack : '');
});
window.addEventListener('unhandledrejection', function(e) {
  var kutu = document.getElementById('hata-kutusu');
  kutu.style.display = 'block';
  kutu.textContent += '\n\nPROMISE HATASI: ' + (e.reason && e.reason.message ? e.reason.message : JSON.stringify(e.reason));
});
</script>

// ─── OTOMATİK JSON DOSYASI (Bağlı Dosya) ──────────────────────────
// Amaç: localStorage sadece bu tarayıcıda/cihazda kalıyor. Kullanıcı bir
// JSON dosyası SEÇTİĞİNDE (masaüstünde vb.), her state değişiminde o dosya
// da otomatik güncellenir. Böylece dosyayı başka bir cihaza taşısan bile
// en son girilen bilgiler o JSON dosyasının içinde durur.
var OTO_DB_ADI = "golge_yap_dosya_db";
var OTO_STORE_ADI = "handles";
var OTO_ANAHTAR = "otomatik_json_dosya";

function otoDbAc() {
  return new Promise(function (resolve, reject) {
    if (!window.indexedDB) { reject(new Error("IndexedDB yok")); return; }
    var istek = window.indexedDB.open(OTO_DB_ADI, 1);
    istek.onupgradeneeded = function () {
      istek.result.createObjectStore(OTO_STORE_ADI);

let _fisNo = parseInt(LS.get("gylge_fisno") || "1000", 10);
function yeniFisNo() {
  _fisNo++;
  LS.set("gylge_fisno", String(_fisNo));
  return String(_fisNo).padStart(4, "0");
}
function cariId(c) {
  if (c.kategori === "dukkan") return `DK-${c.kapi_no || c.daire_no}`;
  return `${c.blok}${String(c.daire_no).padStart(2, "0")}`;
}
function kapiLabel(c) {
  if (c.kategori === "dukkan") return c.kapi_no || "D" + (c.daire_no || "");
  return (c.blok || "") + (c.daire_no ? "" + String(c.daire_no).padStart(2, "0") : "");
}
function hisseGruplari(list) {
  var l = list || [];
  var ids = {};
  l.forEach(function (h) { ids[h.id] = h; });
  function kokBul(h) {
    var gorulen = {};
    var cur = h;
    while (cur.ustKisiId && ids[cur.ustKisiId] && !gorulen[cur.id]) {
      gorulen[cur.id] = true;
      cur = ids[cur.ustKisiId];
    }
    return cur;
  }
  var roots = l.filter(function (h) { return !h.ustKisiId || !ids[h.ustKisiId]; });
  return roots.map(function (r) {
    var children = l.filter(function (h) { return h.id !== r.id && kokBul(h).id === r.id; });
    return { root: r, children: children };
  });
}
// ── Gerçek çok seviyeli hane ağacı — her kişinin kendi doğrudan çocukları, derinlik bilgisiyle ──
function haneAgaciKur(list) {
  var l = list || [];
  var ids = {};
  l.forEach(function (h) { ids[h.id] = h; });
  var cocukMap = {};
  l.forEach(function (h) {
    if (h.ustKisiId && ids[h.ustKisiId] && h.ustKisiId !== h.id) {
      (cocukMap[h.ustKisiId] = cocukMap[h.ustKisiId] || []).push(h);
    }
  });
  var roots = l.filter(function (h) { return !h.ustKisiId || !ids[h.ustKisiId]; });
  function dugumKur(kisi, seviye, izYolu) {
    if (izYolu.indexOf(kisi.id) !== -1) return { kisi: kisi, seviye: seviye, cocuklar: [] }; // çevrim koruması
    var yeniYol = izYolu.concat([kisi.id]);
    var cocuklar = (cocukMap[kisi.id] || []).map(function (c) { return dugumKur(c, seviye + 1, yeniYol); });
    return { kisi: kisi, seviye: seviye, cocuklar: cocuklar };
  }
  return roots.map(function (r) { return dugumKur(r, 0, []); });
}
// ── Ağacı düz listeye çeviren yardımcı (satır bazlı tablo render için) ──
function haneAgaciDuzlestir(dugumler) {
  var sonuc = [];
  function gez(d) {
    sonuc.push(d);
    d.cocuklar.forEach(gez);
  }
  dugumler.forEach(gez);
  return sonuc;
}
function formatTL(n) {
  if (n === undefined || n === null || isNaN(n)) return "0 ₺";
  const a = Math.abs(n);
  const s = a.toLocaleString("tr-TR", {
    minimumFractionDigits: 0,
    maximumFractionDigits: 0
  });
  return (n < 0 ? "-" : "") + s + " ₺";
}
function bugun() {

function formatTarih(s) {
  const d = new Date(s);

    month: "short",
    year: "numeric"
  });

// ─── SABİTLER ────────────────────────────────────────────────────
const HARIC_IDS = []; // Artık kimse hariç değil

// ─── KARA LİSTE (kalıcı muafiyet) ─────────────────────────────────
// Toplu Tahsilat / Toplu Borçlandır işlemlerinde otomatik olarak muaf tutulacak kişiler.
// ⚠️ ÖNEMLİ: "A51" (Salim Önal ve hissedarları) KESİNLİKLE bu listeye eklenmeyecek —
// kullanıcı açıkça bunu istedi. Kod içinde her yerde ayrıca güvenlik filtresiyle korunuyor.
const KARA_LISTE_VARSAYILAN = ["DK-D70", "DK-D40", "DK-D80", "A33", "A49", "DK-D60", "DK-D69", "DK-D64", "DK-D72"];
const KARA_LISTE_SEED_V = 1; // Varsayılan liste güncellendiğinde bu sayıyı artırın
// ── Bildirim sistemi: kullanıcı listesi + aç/kapa ──
const DEFAULT_KULLANICILAR = [
  { id: "u1", ad: "Erdin", bildirimAcik: true },
  { id: "u2", ad: "Gülay", bildirimAcik: true }
];
function karaListeGuvenli(liste) {
  // A51 hiçbir koşulda kara listede olamaz — ekstra güvenlik katmanı
  return (liste || []).filter(id => id !== "A51");
}
function muteahhitMi(c) {
  const ad = c.ad.toLowerCase();
  return ad.includes("müteahhit") || ad.includes("mütahit") || ad.includes("mütehha") || ad.includes("müteah");
}
function hedefDaireler(cariler) {
  // Daire + Dükkan dahil, Gülay Kaya (A29) ve Müteahhit hariç
  return cariler.filter(c => (c.kategori === "daire" || c.kategori === "dukkan") && !HARIC_IDS.includes(c.id) && !muteahhitMi(c));
}

// ─── BAŞLANGIÇ STATE ─────────────────────────────────────────────
// ── Cari listesini her zaman NUMBERS_STATE'deki güncel bilgilerle birleştir ──
// (Hem yerel yükleme hem de buluttan gelen veri için kullanılır — TC/hissedar
// düzeltmeleri asla eski buluttan gelen veriyle ezilmesin diye.)
function stateGuncelBilgilerleBirlestir(parsed) {
  if (parsed.cariler) {
    parsed.cariler = parsed.cariler.map(c => {
      if ((c.id === "DK-D37" || c.id === "DK-2") && c.ad && c.ad.includes("DARÜLACEZE")) {
        return { ...c, id: "DK-D80", kapi_no: "D80", daire_no: 80 };
      }
      if (c.ad && c.ad.includes("DARÜLACEZE") && c.id !== "DK-D80") {
        return { ...c, id: "DK-D80", kapi_no: "D80", daire_no: 80 };
      }
      return c;
    });
  }
  const nsMap = {};
  NUMBERS_STATE.cariler.forEach(c => { nsMap[c.id] = c; });
  const mergedCariler = parsed.cariler.map(c => {
    const ns = nsMap[c.id];
    if (!ns) return c;
    const initHareketler = ns.hareketler.filter(h => h.id && h.id.startsWith('init-'));
    const TAHSILAT_SIFIRLA = ["DK-D70", "DK-D40", "DK-D80", "A33", "A49", "A51", "DK-D60", "DK-D69", "DK-D64", "DK-D72"];
    const kullaniciHareketler = TAHSILAT_SIFIRLA.includes(c.id)
      ? c.hareketler.filter(h => !h.id || !h.id.startsWith('init-')).filter(h => h.tutar >= 0)
      : c.hareketler.filter(h => !h.id || !h.id.startsWith('init-'));
    const kdBase = ns.kentsel_donum || {};
    const kdUser = c.kentsel_donum || {};
    const mergedKD = Object.assign({}, kdBase, kdUser);
    return { ...c,
      ad: ns.ad || c.ad,
      tc: ns.tc || c.tc || "",
      hisse: ns.hisse || c.hisse || "",
      edinme_sebebi: ns.edinme_sebebi || c.edinme_sebebi || "",
      edinme_tarihi: ns.edinme_tarihi || c.edinme_tarihi || "",
      kategori: ns.kategori || c.kategori || "",
      blok: ns.blok || c.blok || "",
      hissedarlar: ns.hissedarlar || [],
      kentsel_donum: Object.keys(mergedKD).length > 0 ? mergedKD : undefined,
      hareketler: [...initHareketler, ...kullaniciHareketler],
    };
  });
  const savedIds = new Set(parsed.cariler.map(c => c.id));
  const yeniCariler = NUMBERS_STATE.cariler.filter(c => !savedIds.has(c.id)).map(c => ({ ...c, hissedarlar: c.hissedarlar || [] }));
  const allCariler = [...mergedCariler, ...yeniCariler];
  const nsDKD80 = NUMBERS_STATE.cariler.find(c => c.id === "DK-D80");
  const finalCariler = allCariler.map(c => {
    if (c.id === "DK-D80" && nsDKD80) return { ...c, hissedarlar: nsDKD80.hissedarlar || [] };
    return c;
  });
  let kaliciMuaflar = parsed.kaliciMuaflar || [];
  const eldeSeedV = parsed.karaListeSeedV || 0;
  if (eldeSeedV < KARA_LISTE_SEED_V) {
    const birlesik = new Set(kaliciMuaflar);
    KARA_LISTE_VARSAYILAN.forEach(id => birlesik.add(id));
    kaliciMuaflar = Array.from(birlesik);
  }
  kaliciMuaflar = karaListeGuvenli(kaliciMuaflar);
  const kullanicilarYuklu = parsed.kullanicilar && parsed.kullanicilar.length ? parsed.kullanicilar : JSON.parse(JSON.stringify(DEFAULT_KULLANICILAR));
  const bildirimlerYuklu = parsed.bildirimler || [];
  return { ...parsed, cariler: finalCariler, kaliciMuaflar, karaListeSeedV: KARA_LISTE_SEED_V, kullanicilar: kullanicilarYuklu, bildirimler: bildirimlerYuklu };
}

function buildInitialState() {
  try {
    const saved = LS.get("golge_yap_state");
    if (saved && saved.length > 10) {
      let parsed = JSON.parse(saved);
      return stateGuncelBilgilerleBirlestir(parsed);
    }
  } catch(e){console.warn("State yuklenemedi:",e);}
  const taze = JSON.parse(JSON.stringify(NUMBERS_STATE));
  taze.kaliciMuaflar = karaListeGuvenli(KARA_LISTE_VARSAYILAN);
  taze.karaListeSeedV = KARA_LISTE_SEED_V;
  taze.kullanicilar = JSON.parse(JSON.stringify(DEFAULT_KULLANICILAR));
  taze.bildirimler = [];
  return taze;
}

// ─── ANA UYGULAMA ────────────────────────────────────────────────
function GolgeYapMuhasebe() {
  const [state, setState] = useState(buildInitialState);
  const [ekran, setEkran] = useState("anasayfa");

  // ── Bulut senkronizasyon durumu ──
  const [bulutDurum, setBulutDurum] = useState(FB_AKTIF ? "bağlanıyor" : "kapalı"); // kapalı|bağlanıyor|bağlı|hata
  const sonJsonRef = useRef(null);
  const yazmaZamanlayiciRef = useRef(null);

  // ── Bağlı Dosya (otomatik JSON) durumu ──
  // durum: "yok" | "kontrol" | "bağlı" | "izin_gerekli" | "desteklenmiyor" | "hata"
  const [otoDurum, setOtoDurum] = useState("kontrol");
  const otoHandleRef = useRef(null);
  const otoJsonZamanlayiciRef = useRef(null);
  const otoDesteklenirMi = typeof window !== "undefined" && !!window.showSaveFilePicker;

  // Sayfa açılışında önceden seçilmiş bir dosya var mı diye IndexedDB'ye bak
  useEffect(() => {
    if (!otoDesteklenirMi) { setOtoDurum("desteklenmiyor"); return; }
    otoHandleOku().then(handle => {
      if (!handle) { setOtoDurum("yok"); return; }
      otoHandleRef.current = handle;
      handle.queryPermission({ mode: "readwrite" }).then(izin => {
        setOtoDurum(izin === "granted" ? "bağlı" : "izin_gerekli");
      }).catch(() => setOtoDurum("izin_gerekli"));
    }).catch(() => setOtoDurum("yok"));
  }, []);

  // Kullanıcı bir dosya seçer / değiştirir (tıklama gerektirir — tarayıcı kuralı)
  const otoDosyaSec = useCallback(async () => {
    if (!otoDesteklenirMi) return;
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: "GolgeYap_" + bugun() + ".json",
        types: [{ description: "JSON Dosyası", accept: { "application/json": [".json"] } }]
      });
      otoHandleRef.current = handle;
      await otoHandleKaydet(handle);
      setOtoDurum("bağlı");
      goster("Dosya bağlandı — bundan sonra her değişiklik buraya da yazılacak ✓");
      // İlk bağlantıda güncel veriyi hemen yaz
      otoJsonYaz(sonJsonRef.current);
    } catch (e) {
      if (e.name !== "AbortError") { console.warn("Dosya seçilemedi:", e); setOtoDurum("hata"); }
    }
  }, [otoDesteklenirMi]);

  // İzin tekrar istenmesi gerektiğinde (tarayıcı yeniden açıldığında vb.)
  const otoIzinIste = useCallback(async () => {
    if (!otoHandleRef.current) return;
    try {
      const izin = await otoHandleRef.current.requestPermission({ mode: "readwrite" });
      setOtoDurum(izin === "granted" ? "bağlı" : "izin_gerekli");
      if (izin === "granted") otoJsonYaz(sonJsonRef.current);
    } catch (e) { setOtoDurum("izin_gerekli"); }
  }, []);

  // Bağlantıyı kaldır
  const otoBaglantiyiKaldir = useCallback(async () => {
    otoHandleRef.current = null;
    await otoHandleSil();
    setOtoDurum("yok");
    goster("Otomatik dosya bağlantısı kaldırıldı");
  }, []);

  // Bağlı dosyaya asıl yazma işlemi
  async function otoJsonYaz(json) {
    if (!otoHandleRef.current || !json) return;
    try {
      const izin = await otoHandleRef.current.queryPermission({ mode: "readwrite" });
      if (izin !== "granted") { setOtoDurum("izin_gerekli"); return; }
      const veri = { versiyon: 1, tarih: bugun(), state: JSON.parse(json), fisNo: LS.get("gylge_fisno") || "1000" };
      const writable = await otoHandleRef.current.createWritable();
      await writable.write(JSON.stringify(veri, null, 2));
      await writable.close();
      setOtoDurum("bağlı");
    } catch (e) {
      console.warn("Otomatik JSON yazma hatası:", e);
      setOtoDurum("hata");
    }
  }

  // ── Otomatik kayıt — her state değişiminde localStorage'a (ve varsa buluta/bağlı dosyaya) yaz ──
  const setStateVeKaydet = useCallback(updater => {
    setState(prev => {
      const yeni = typeof updater === "function" ? updater(prev) : updater;
      try {
        const json = JSON.stringify(yeni);
        LS.set("golge_yap_state", json);
        sonJsonRef.current = json;
        if (FB_AKTIF && FB_DOC_REF) {
          // Yazımları 800ms geciktirip biriktiriyoruz (her tuşta değil, kısa duraklamada buluta yazılır)
          clearTimeout(yazmaZamanlayiciRef.current);
          yazmaZamanlayiciRef.current = setTimeout(() => {
            FB_DOC_REF.set({
              payload: json,
              guncelleyen: (fbAuth.currentUser && fbAuth.currentUser.email) || "bilinmiyor",
              guncellemeZamani: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => setBulutDurum("bağlı")).catch(e => { console.warn("Bulut kaydı hatası:", e); setBulutDurum("hata"); });
          }, 800);
        }
        if (otoHandleRef.current) {
          // Bağlı JSON dosyasına da 800ms geciktirilerek yazılır (her tuşta değil)
          clearTimeout(otoJsonZamanlayiciRef.current);
          otoJsonZamanlayiciRef.current = setTimeout(() => otoJsonYaz(json), 800);
        }
      } catch (e) {
        console.warn("Kayıt hatası:", e);
      }
      return yeni;
    });
  }, []);

  // ── Buluttan canlı güncelleme dinle ──
  useEffect(() => {

    const unsub = FB_DOC_REF.onSnapshot(snap => {

    return () => unsub();
  }, []); // anasayfa|cari_detay|fiş_listesi|kasa|toplu_borc|hareket_ekle

  function yasHesapla(dogumTarihi) {
    if (!dogumTarihi) return null;
    const m = dogumTarihi.match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/);
    if (!m) return null;
    const dogum = new Date(parseInt(m[3]), parseInt(m[2]) - 1, parseInt(m[1]));
    if (isNaN(dogum.getTime())) return null;
    const simdi = new Date();
    let yas = simdi.getFullYear() - dogum.getFullYear();
    const ay = simdi.getMonth() - dogum.getMonth();
    if (ay < 0 || (ay === 0 && simdi.getDate() < dogum.getDate())) yas--;
    return yas;
  }

  // ── Fiş sil (cari+kasa entegre) ──
  function fisSil(fisNo, cariId_, sadeceBuCari = false) {
    const hedefFis = state.fisler.find(f => f.fisNo === fisNo);
    const topluMu = hedefFis && hedefFis.toplu;

    // Cari kartından silince → sadece o cariyi etkile (toplu olsa bile)
    // Fiş listesinden silince → toplu ise tümünü sil
    const sadeceCari = sadeceBuCari || topluMu && !!cariId_;
    const mesaj = sadeceCari ? `Bu hareketi sadece bu cariden silmek istiyor musunuz?\n(Diğer carilerdeki aynı fiş etkilenmez)` : topluMu ? `#${fisNo} TOPLU fişi tamamen silmek istiyor musunuz?\n${hedefFis.cariSayisi || "?"} dairedeki TÜM hareketler silinecek!` : `#${fisNo} numaralı fişi silmek istiyor musunuz?`;
    setOnayModal({
      mesaj,
      onay: () => {
        setStateVeKaydet(prev => {
          let yeniCariler;
          let yeniKasa = prev.kasaHareketler;
          let yeniFisler = prev.fisler;
          if (sadeceCari && cariId_) {
            // SADECE bu carinin hareketi silinir — diğerleri dokunulmaz
            yeniCariler = prev.cariler.map(c => c.id === cariId_ ? {
              ...c,
              hareketler: c.hareketler.filter(h => !(h.fisNo === fisNo))
            } : c);
            // Kasadan da sadece bu carinin kaydını sil
            yeniKasa = prev.kasaHareketler.filter(k => !(k.fisNo === fisNo && k.cariId === cariId_));
            // Fiş listesinde toplu fişin cariSayısını 1 azalt
            yeniFisler = prev.fisler.map(f => f.fisNo === fisNo && f.toplu ? {
              ...f,
              cariSayisi: (f.cariSayisi || 1) - 1,
              tutar: f.tutar - f.tutar / (f.cariSayisi || 1)
            } : f).filter(f => !f.toplu || (f.cariSayisi || 0) > 0);
          } else if (topluMu) {
            // Fiş listesinden toplu sil — tüm carileri etkile
            yeniCariler = prev.cariler.map(c => ({
              ...c,
              hareketler: c.hareketler.filter(h => h.fisNo !== fisNo)
            }));
            yeniKasa = prev.kasaHareketler.filter(k => k.fisNo !== fisNo);
            yeniFisler = prev.fisler.filter(f => f.fisNo !== fisNo);
          } else {
            // Tekil fiş
            yeniCariler = prev.cariler.map(c => c.id === cariId_ ? {
              ...c,
              hareketler: c.hareketler.filter(h => h.fisNo !== fisNo)
            } : c);
            yeniKasa = prev.kasaHareketler.filter(k => k.fisNo !== fisNo);
            yeniFisler = prev.fisler.filter(f => f.fisNo !== fisNo);
          }
          return {
            ...prev,
            cariler: yeniCariler,
            kasaHareketler: yeniKasa,
            fisler: yeniFisler
          };
        });
        setOnayModal(null);
        goster(sadeceCari ? "Hareket bu cariden silindi" : topluMu ? `Toplu fiş #${fisNo} silindi` : `Fiş #${fisNo} silindi`, "warn");
      },
      iptal: () => setOnayModal(null)
    });
  }

  // ── Veri dışa aktar ──
  async function veriDisaAktar() {
    const veri = {
      versiyon: 1,
      tarih: bugun(),
      state,
      fisNo: LS.get("gylge_fisno") || "1000"
    };
    const json = JSON.stringify(veri, null, 2);
    const dosyaAdi = "GolgeYap_" + bugun() + ".json";
    const iosCihaz = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
      (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1); // iPadOS Safari kendini Mac gibi tanıtır

    // 0) Mac/Windows masaüstü — doğrudan indir. Tarayıcı otomatik olarak
    //    İndirilenler klasörüne kaydeder; bu, masaüstünde en güvenilir yöntem.
    //    (iPhone/iPad'de bu yöntem güvenilir çalışmadığı için atlanır.)
    if (!iosCihaz) {
      try {
        const blob = new Blob([json], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = dosyaAdi;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        goster("İndirilenler klasörüne kaydedildi ✓");
        return;
      } catch (e) {
        console.warn("Doğrudan indirme başarısız, diğer yöntem denenecek:", e);
      }
    }

    // 1) Masaüstü Chrome/Edge — doğrudan bir klasör/dosya konumu seçtirir
    if (window.showSaveFilePicker) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: dosyaAdi,
          types: [{
            description: "JSON Dosyası",
            accept: {
              "application/json": [".json"]
            }
          }]
        });
        const writable = await handle.createWritable();
        await writable.write(json);
        await writable.close();
        goster("Kaydedildi ✓");
        return;
      } catch (e) {
        if (e.name === "AbortError") return; // kullanıcı iptal etti
      }
    }

    // 2) iPhone/iPad Safari ve Android — native Paylaşım sayfası (Web Share API).
    //    Bu, "Dosyalar'a Kaydet" seçeneğini gerçekten sunan tek güvenilir yöntem.
    //    Blob URL'yi sekmede açmak Safari'de JSON'ı gösteremediği için bembeyaz
    //    ekran kalıyor — o yüzden bu adım önce denenmeli.
    try {
      const dosya = new File([json], dosyaAdi, { type: "application/json" });
      if (navigator.canShare && navigator.canShare({ files: [dosya] })) {
        await navigator.share({
          files: [dosya],
          title: dosyaAdi
        });
        goster("Kaydetmek için 'Dosyalar'a Kaydet' seçeneğini kullan ✓");
        return;
      }
    } catch (e) {
      if (e.name === "AbortError") return; // kullanıcı paylaşım sayfasını kapattı
      console.warn("Paylaşım ile kaydetme başarısız, diğer yöntem denenecek:", e);
    }

    // 3) Yeni sekmede aç (son çare — bazı eski tarayıcılarda Paylaşım API'si yoksa)
