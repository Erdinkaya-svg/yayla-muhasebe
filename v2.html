let _fisNo = parseInt(LS.get("gylge_fisno") || "1000", 10);
function yeniFisNo() {
  _fisNo++;
  LS.set("gylge_fisno", String(_fisNo));
  return String(_fisNo).padStart(4, "0");
}
function cariId(c) {
  if (c.kategori === "dukkan") return `DK-${c.kapi_no || c.daire_no}`;
  return `${c.blok}${String(c.daire_no).padStart(2, "0")}`;
}
function kapiLabel(c) {
  if (c.kategori === "dukkan") return c.kapi_no || `D${c.daire_no}`;
  return `${c.blok}${c.daire_no}`;
}
function formatTL(n) {
  if (n === undefined || n === null || isNaN(n)) return "0 ₺";
  const a = Math.abs(n);
  const s = a.toLocaleString("tr-TR", {
    minimumFractionDigits: 0,
    maximumFractionDigits: 0
  });
  return (n < 0 ? "-" : "") + s + " ₺";
}
function bugun() {
  return new Date().toISOString().slice(0, 10);
}
function formatTarih(s) {
  const d = new Date(s);
  return d.toLocaleDateString("tr-TR", {
    day: "2-digit",
    month: "short",
    year: "numeric"
  });
}

const HARIC_IDS = []; // Artık kimse hariç değil
function muteahhitMi(c) {
  const ad = c.ad.toLowerCase();
  return ad.includes("müteahhit") || ad.includes("mütahit") || ad.includes("mütehha") || ad.includes("müteah");
}
function hedefDaireler(cariler) {
  // Daire + Dükkan dahil, Gülay Kaya (A29) ve Müteahhit hariç
  return cariler.filter(c => (c.kategori === "daire" || c.kategori === "dukkan") && !HARIC_IDS.includes(c.id) && !muteahhitMi(c));
}

function buildInitialState() {
  try {
    const saved = LS.get("golge_yap_state");
    if (saved && saved.length > 10) {
      const parsed = JSON.parse(saved);
      const nsMap = {};
      NUMBERS_STATE.cariler.forEach(c => { nsMap[c.id] = c; });
      const mergedCariler = parsed.cariler.map(c => {
        const ns = nsMap[c.id];
        if(!ns) return c;
        const initHareketler = ns.hareketler.filter(h => h.id && h.id.startsWith('init-'));
        const kullaniciHareketler = c.hareketler.filter(h => !h.id || !h.id.startsWith('init-'));
        return { ...c,
          ad: ns.ad || c.ad,
          tc: ns.tc || c.tc || "",
          hisse: ns.hisse || c.hisse || "",
          edinme_sebebi: ns.edinme_sebebi || c.edinme_sebebi || "",
          edinme_tarihi: ns.edinme_tarihi || c.edinme_tarihi || "",
          hissedarlar: (ns.hissedarlar&&ns.hissedarlar.length>0)?ns.hissedarlar:(c.hissedarlar||[]),
          hareketler: [...initHareketler, ...kullaniciHareketler],
        };
      });

    const gercekTutar = cfg.isaret === 0 ? tutar : tutar * cfg.isaret;
    const kasaEtki = ["TAHSİLAT", "ÖDEME"].includes(hareketTip);
    const kasaTutar = hareketTip === "TAHSİLAT" ? tutar : hareketTip === "ÖDEME" ? -tutar : 0;
    const h = {
      id: fNo,
      fisNo: fNo,
      tarih,
      tip: hareketTip,
      tutar: gercekTutar,
      aciklama: hareketAcik || hareketTip,
      kasaEtki,
      kasaTutar,
      hissedarId: hareketHissedarId || null
    };
    setStateVeKaydet(prev => {
      const yeniCariler = prev.cariler.map(c => c.id === secilenCari.id ? {
        ...c,
        hareketler: [...c.hareketler, h]
      } : c);
      const yeniKasa = kasaEtki ? [...prev.kasaHareketler, {

        tip: hareketTip,

        aciklama: hareketAcik || hareketTip
      }] : prev.kasaHareketler;
      const yeniFis = {
        fisNo: fNo,
        tarih,
        tip: hareketTip,
        aciklama: hareketAcik || hareketTip,

      };
      return {

  // ── Fiş sil (cari+kasa entegre) ──
  function fisSil(fisNo, cariId_, sadeceBuCari = false) {
    const hedefFis = state.fisler.find(f => f.fisNo === fisNo);
    const topluMu = hedefFis && hedefFis.toplu;

    // Cari kartından silince → sadece o cariyi etkile (toplu olsa bile)
    // Fiş listesinden silince → toplu ise tümünü sil
    const sadeceCari = sadeceBuCari || topluMu && !!cariId_;
    const mesaj = sadeceCari ? `Bu hareketi sadece bu cariden silmek istiyor musunuz?\n(Diğer carilerdeki aynı fiş etkilenmez)` : topluMu ? `#${fisNo} TOPLU fişi tamamen silmek istiyor musunuz?\n${hedefFis.cariSayisi || "?"} dairedeki TÜM hareketler silinecek!` : `#${fisNo} numaralı fişi silmek istiyor musunuz?`;
    setOnayModal({
      mesaj,
      onay: () => {
        setStateVeKaydet(prev => {
          let yeniCariler;
          let yeniKasa = prev.kasaHareketler;
          let yeniFisler = prev.fisler;
          if (sadeceCari && cariId_) {
            // SADECE bu carinin hareketi silinir — diğerleri dokunulmaz
            yeniCariler = prev.cariler.map(c => c.id === cariId_ ? {
              ...c,
              hareketler: c.hareketler.filter(h => !(h.fisNo === fisNo))
            } : c);
            // Kasadan da sadece bu carinin kaydını sil
            yeniKasa = prev.kasaHareketler.filter(k => !(k.fisNo === fisNo && k.cariId === cariId_));
            // Fiş listesinde toplu fişin cariSayısını 1 azalt
            yeniFisler = prev.fisler.map(f => f.fisNo === fisNo && f.toplu ? {
              ...f,
              cariSayisi: (f.cariSayisi || 1) - 1,
              tutar: f.tutar - f.tutar / (f.cariSayisi || 1)
            } : f).filter(f => !f.toplu || (f.cariSayisi || 0) > 0);
          } else if (topluMu) {
            // Fiş listesinden toplu sil — tüm carileri etkile
            yeniCariler = prev.cariler.map(c => ({
              ...c,
              hareketler: c.hareketler.filter(h => h.fisNo !== fisNo)
            }));
            yeniKasa = prev.kasaHareketler.filter(k => k.fisNo !== fisNo);
            yeniFisler = prev.fisler.filter(f => f.fisNo !== fisNo);
          } else {
            // Tekil fiş
            yeniCariler = prev.cariler.map(c => c.id === cariId_ ? {
              ...c,
              hareketler: c.hareketler.filter(h => h.fisNo !== fisNo)
            } : c);
            yeniKasa = prev.kasaHareketler.filter(k => k.fisNo !== fisNo);
            yeniFisler = prev.fisler.filter(f => f.fisNo !== fisNo);
          }
          return {
            ...prev,
            cariler: yeniCariler,
            kasaHareketler: yeniKasa,
            fisler: yeniFisler
          };
        });
        setOnayModal(null);
        goster(sadeceCari ? "Hareket bu cariden silindi" : topluMu ? `Toplu fiş #${fisNo} silindi` : `Fiş #${fisNo} silindi`, "warn");
      },
      iptal: () => setOnayModal(null)
    });
  }

  // ── Veri dışa aktar ──
  async function veriDisaAktar() {
    const veri = {
      versiyon: 1,
      tarih: bugun(),
      state,
      fisNo: LS.get("gylge_fisno") || "1000"
    };
    const json = JSON.stringify(veri, null, 2);
    const dosyaAdi = "GolgeYap_" + bugun() + ".json";

    // iOS/Modern tarayıcı — File System Access API ile kayıt yeri seç
    if (window.showSaveFilePicker) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: dosyaAdi,
          types: [{
            description: "JSON Dosyası",
            accept: {
              "application/json": [".json"]
            }
          }]
        });
        const writable = await handle.createWritable();
        await writable.write(json);
        await writable.close();
        goster("Kaydedildi ✓");
        return;
      } catch (e) {
        if (e.name === "AbortError") return; // kullanıcı iptal etti
      }
    }

    // Fallback — eski yöntem (İndirilenler'e)
    const blob = new Blob([json], {
      type: "application/json"
    });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = dosyaAdi;
    a.click();
    URL.revokeObjectURL(url);
    goster("Veriler dışa aktarıldı ✓");
  }

  // ── Veri içe aktar ──
  function veriIceAktar(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const veri = JSON.parse(ev.target.result);
        if (!veri.state || !veri.state.cariler) {
          goster("Geçersiz dosya", "err");
          return;
        }
        // fisNo geri yükle
        if (veri.fisNo) LS.set("gylge_fisno", veri.fisNo);
        // State'i yükle ve kaydet
        const yeniState = veri.state;
        LS.set("golge_yap_state", JSON.stringify(yeniState));
        setStateVeKaydet(() => yeniState);
        goster(`Veriler yüklendi — ${veri.tarih || ""} ✓`);
      } catch (err) {
        goster("Dosya okunamadı: " + err.message, "err");
      }
      e.target.value = ""; // reset input
    };
    reader.readAsText(file);
  }

// Bir DOM elemanını PDF blob'una çevirir (sayfalara bölerek).
async function ekstrePdfBlobOlustur(elementId) {
  const el = document.getElementById(elementId);
  if (!el || typeof html2canvas === "undefined" || typeof window.jspdf === "undefined") {

  }

    return "paylasildi";

  a.href = url;
  a.download = dosyaAdi;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 4000);
